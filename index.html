<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Alumnos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .controls {
            margin: 20px 0;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 5px;
        }
        input, select, button {
            padding: 8px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #salida {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 15px;
            border-radius: 5px;
            white-space: pre-wrap;
            font-family: monospace;
            max-height: 400px;
            overflow: auto;
        }
    </style>
    <script src="js/functions.js"></script>
</head>
<body>
    <div class="container">
        <h1> Generador de Alumnos</h1>
        
        <div class="controls">
            <label>Número de registros:</label>
            <input type="number" id="registros" value="10" min="1" max="50000">
            <button onclick="document.getElementById('registros').value=1;">1</button>
            <button onclick="document.getElementById('registros').value=50000;">50000</button>
            
            <br><br>
            
            <label>Tipo de archivo:</label>
            <select id="opcion">
                <option value="1">SQL MySQL/MariaDB</option>
                <option value="2">PostgreSQL</option>
                <option value="3">CSV</option>
                <option value="4">JSON</option>
            </select>
            
            <br><br>
            
            <button onclick="generar()"> Generar</button>
            <button onclick="guardarArchivo()"> Guardar</button>
        </div>
        
        <h3>Vista previa:</h3>
        <div id="salida"></div>
    </div>
</body>
</html>
